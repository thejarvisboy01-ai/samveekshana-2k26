<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samveekshana 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text: #0a0a0a;
            --muted: #666666;
            --mesh-1: rgba(240, 240, 245, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
            height: 100%;
        }

        /* Ambient background blobs */
        .mesh-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
        }

        .mesh-circle {
            position: absolute;
            border-radius: 50%;
            background: var(--mesh-1);
            animation: move 20s infinite alternate;
        }

        .c1 {
            width: 400px;
            height: 400px;
            top: -100px;
            left: -100px;
            background: #e0e7ff;
        }

        .c2 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -150px;
            background: #fdf2f8;
            animation-delay: -5s;
        }

        @keyframes move {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(100px, 100px) scale(1.2);
            }
        }

        /* Coding Canvas */
        #codeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.12;
            /* Fixed invalid opacity */
            pointer-events: none;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
            z-index: 10;
            padding: 2rem;
            position: relative;
        }

        .logo-mark {
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .logo-mark svg {
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: clamp(2rem, 10vw, 5rem);
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: 1rem;
            word-break: break-word;
            /* Prevent overflow on very narrow screens */
        }

        h1 span {
            font-weight: 200;
            color: var(--muted);
            display: inline-block;
            /* Helps with wrapping */
        }

        .subtitle {
            font-size: clamp(0.75rem, 3.5vw, 1rem);
            /* More responsive sizing */
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            min-height: 1.5em;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1rem;
            }

            .logo-mark {
                margin-bottom: 1rem;
            }

            .logo-mark svg {
                width: 32px;
                height: 32px;
            }

            .footer {
                bottom: 20px;
                font-size: 0.6rem;
                letter-spacing: 0.15em;
            }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--text);
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        .footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--muted);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="mesh-container">
        <div class="mesh-circle c1"></div>
        <div class="mesh-circle c2"></div>
    </div>

    <canvas id="codeCanvas"></canvas>

    <main class="container">
        <div class="logo-mark">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 18L22 12L16 6" stroke="black" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M8 6L2 12L8 18" stroke="black" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M13 4L11 20" stroke="black" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
        </div>
        <h1>Samveekshana <span>2026</span></h1>
        <div class="subtitle">
            <span id="typewriter"></span><span class="cursor"></span>
        </div>
    </main>

    <div class="footer">STAGING // DEV_ENVIRONMENT</div>

    <script>
        // --- Coding Rain Effect ---
        const canvas = document.getElementById('codeCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns;
        const fontSize = 14;
        const codeSnippets = [
            'git push origin main', 'npm run build', 'void main() {',
            'import { App } from "./ui";', 'const x = Math.random();',
            'await db.connect();', '<section class="hero">', 'console.log("ready...");',
            '// compiling shaders', 'docker build .', 'pip install -r requirements.txt',
            'const config = { env: "prod" };', 'system.init();', 'while(true) { loop(); }'
        ];
        let drops = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / 180);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = {
                    x: i * 180,
                    y: Math.random() * -height,
                    speed: 0.5 + Math.random() * 1.5,
                    snippet: codeSnippets[Math.floor(Math.random() * codeSnippets.length)]
                };
            }
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.font = `italic ${fontSize}px "Courier New", monospace`;
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(drops[i].snippet, drops[i].x, drops[i].y);
                drops[i].y += drops[i].speed;
                if (drops[i].y > height) {
                    drops[i].y = -20;
                    drops[i].snippet = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
                }
            }
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);
        resize();
        draw();

        // --- Typewriter ---
        const words = ["UNDER DEVELOPMENT", "COMING SOON"];
        let wordIdx = 0, charIdx = 0, isDeleting = false;
        const target = document.getElementById('typewriter');

        function type() {
            const current = words[wordIdx];
            target.textContent = isDeleting ? current.substring(0, charIdx - 1) : current.substring(0, charIdx + 1);
            charIdx = isDeleting ? charIdx - 1 : charIdx + 1;

            let speed = isDeleting ? 40 : 80;
            if (!isDeleting && charIdx === current.length) { speed = 2000; isDeleting = true; }
            else if (isDeleting && charIdx === 0) { isDeleting = false; wordIdx = (wordIdx + 1) % words.length; speed = 500; }
            setTimeout(type, speed);
        }
        type();

        // --- Parallax ---
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) * 0.015;
            const y = (e.clientY - window.innerHeight / 2) * 0.015;
            document.querySelector('.container').style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body>

</html>
