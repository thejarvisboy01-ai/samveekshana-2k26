<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMVEEKSHANA 2k26 | Registration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="registration-body">

    <div class="hologram-scene">
        <div class="hologram-container">
            <!-- Projector Base & Light Beams -->
            <div class="light-beams"></div>

            <!-- Hologram Card -->
            <div class="hologram-card">
                <div class="scanline"></div>

                <div class="form-header">
                    <div class="header-decoration">
                        <span>*</span>
                        <span>SAMVEEKSHANA 2K26</span>
                        <span>*</span>
                    </div>
                    <h2>REGISTRATION</h2>
                    <p>Secure your spot in the fest</p>
                </div>

                <form id="registrationForm" enctype="multipart/form-data">
                    <div class="input-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="event_type">Select Event</label>
                        <select id="event_type" name="event_type" required>
                            <option value="" disabled selected>-- Choose an Event --</option>
                        </select>
                    </div>

                    <div class="payment-info" id="feeInfo">
                        <div class="qr-placeholder">
                            <i class="fas fa-indian-rupee-sign"></i>
                        </div>
                        <div class="payment-text">
                            <h4>Registration Fee</h4>
                            <p id="eventFeeText">Select an event to view the fee</p>
                        </div>
                    </div>

                    <!-- Payment Info Details -->
                    <div class="payment-info">
                        <div class="qr-placeholder">
                            <i class="fas fa-qrcode"></i>
                        </div>
                        <div class="payment-text">
                            <h4>Official Payment QR</h4>
                            <p>UPI ID: samveekshana@upi</p>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="utr_number">Transaction / UTR Number</label>
                        <input type="text" id="utr_number" name="utr_number" placeholder="e.g. 123456789012" required>
                    </div>

                    <div class="input-group">
                        <label>Payment Screenshot</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="payment_screenshot" name="payment_screenshot"
                                accept="image/png, image/jpeg, image/webp" required>
                            <div class="file-upload-text">
                                <i class="fas fa-cloud-upload-alt"></i><br>
                                <span>Click to upload or drag and drop</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>INITIATE PROTOCOL <i class="fas fa-chevron-right"
                                style="margin-left:5px; font-size: 0.8em;"></i></span>
                        <div class="loader"></div>
                    </button>
                </form>
            </div>

            <!-- The physical base from which hologram is projected -->
            <div class="projector-base"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script src="js/main.js"></script>
</body>

</html>
