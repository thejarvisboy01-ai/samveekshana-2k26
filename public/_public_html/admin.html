<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SAMVEEKSHANA</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>ADMIN</h2>
                <div
                    style="font-size:0.75rem; color:var(--primary); text-transform:uppercase; letter-spacing:2px; margin-top:0.4rem;">
                    Samveekshana '26
                </div>
            </div>

            <ul class="nav-menu">
                <li class="nav-item active" data-event="all">
                    <i class="fas fa-hdd"></i> <span>All Registrations</span>
                </li>
                <li
                    style="margin: 1.5rem 0 0.5rem 1rem; font-size: 0.75rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase;">
                    Event Categories
                </li>
                <li class="nav-item" data-event="cultural">
                    <i class="fas fa-music"></i> <span>Cultural Festival</span>
                </li>
                <li class="nav-item" data-event="technical">
                    <i class="fas fa-laptop-code"></i> <span>Technical Symposium</span>
                </li>
                <li class="nav-item" data-event="sports">
                    <i class="fas fa-running"></i> <span>Sports Meet</span>
                </li>
                <li class="nav-item" data-event="literary">
                    <i class="fas fa-book"></i> <span>Literary Events</span>
                </li>
                <li class="nav-item" data-event="combo">
                    <i class="fas fa-star"></i> <span>Combo Pass</span>
                </li>
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h1 id="currentEventTitle">All Registrations</h1>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin-top: 0.4rem;">
                        Overview of student registrations
                    </p>
                </div>

                <div class="stat-card"
                    style="padding: 1rem 2rem; flex-direction: row; align-items: center; gap: 1.5rem;">
                    <div class="title" style="margin:0;">Total</div>
                    <div class="value" id="totalCount" style="font-size:2rem; color:var(--primary);">0</div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="data-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Email Address</th>
                            <th>Phone</th>
                            <th>UTR Number</th>
                            <th>Registration Date</th>
                            <th>Receipt</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Loaded dynamically via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Image Modal Overlay -->
    <div class="modal-backdrop" id="imageModal">
        <div class="modal-content">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <img src="" id="modalImage" class="modal-img" alt="Payment Screenshot">
        </div>
    </div>

    <!-- Script that handles dynamic fetching -->
    <script src="js/main.js"></script>
</body>

</html>
