<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAMVEEKSHANA 2k26 | Registration</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* QR Modal */
        .qr-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
        }

        .qr-modal-overlay.active {
            display: flex;
        }

        .qr-modal-box {
            position: relative;
            background: linear-gradient(135deg, #0d0d1a, #1a1a2e);
            border: 1px solid rgba(0, 255, 200, 0.25);
            border-radius: 16px;
            padding: 2rem;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 200, 0.15), 0 0 120px rgba(0, 128, 255, 0.1);
            animation: qrPopIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes qrPopIn {
            from {
                opacity: 0;
                transform: scale(0.85);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .qr-modal-box h3 {
            font-family: 'Space Grotesk', sans-serif;
            color: #00ffc8;
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-bottom: 1.25rem;
            opacity: 0.8;
        }

        .qr-modal-box img {
            width: 100%;
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 200, 0.2);
        }

        .qr-modal-box p {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.05em;
        }

        .qr-modal-close {
            position: absolute;
            top: 0.75rem;
            right: 0.75rem;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: rgba(255, 255, 255, 0.6);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .qr-modal-close:hover {
            background: rgba(255, 80, 80, 0.3);
            color: #fff;
        }

        /* Make the QR payment-info clickable */
        .payment-info.qr-trigger {
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .payment-info.qr-trigger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 255, 200, 0.15);
        }

        /* QR Modal overlay fix */
        .qr-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.88);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
        }

        .qr-modal-overlay.active {
            display: flex !important;
        }
    </style>
</head>

<body class="registration-body">

    <div class="hologram-scene">
        <div class="hologram-container">
            <!-- Projector Base & Light Beams -->
            <div class="light-beams"></div>

            <!-- Hologram Card -->
            <div class="hologram-card">
                <div class="scanline"></div>

                <div class="form-header">
                    <div class="header-decoration">
                        <span>*</span>
                        <span>SAMVEEKSHANA 2K26</span>
                        <span>*</span>
                    </div>
                    <h2>REGISTRATION</h2>
                    <p>Secure your spot in the fest</p>
                </div>

                <form id="registrationForm" enctype="multipart/form-data">
                    <div class="input-group">
                        <label for="full_name">Full Name</label>
                        <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>
                    </div>

                    <div class="input-row">
                        <div class="input-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com" required>
                        </div>
                        <div class="input-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="event_type">Select Event</label>
                        <select id="event_type" name="event_type" required>
                            <option value="" disabled selected>-- Choose an Event --</option>
                        </select>
                    </div>

                    <div class="payment-info" id="feeInfo">
                        <div class="qr-placeholder">
                            <i class="fas fa-indian-rupee-sign"></i>
                        </div>
                        <div class="payment-text">
                            <h4>Registration Fee</h4>
                            <p id="eventFeeText">Select an event to view the fee</p>
                        </div>
                    </div>

                    <!-- Payment Info Details -->
                    <div class="payment-info qr-trigger" id="qrTrigger" title="Click to view QR code">
                        <div class="qr-placeholder">
                            <i class="fas fa-qrcode"></i>
                        </div>
                        <div class="payment-text">
                            <h4>Official Payment QR</h4>
                            <p>Click here to view QR &amp; pay</p>
                        </div>
                    </div>


                    <div class="input-group">
                        <label for="utr_number">Transaction / UTR Number</label>
                        <input type="text" id="utr_number" name="utr_number" placeholder="e.g. 123456789012" required>
                    </div>

                    <div class="input-group">
                        <label>Payment Screenshot</label>
                        <div class="file-upload-wrapper">
                            <input type="file" id="payment_screenshot" name="payment_screenshot"
                                accept="image/png, image/jpeg, image/webp" required>
                            <div class="file-upload-text">
                                <i class="fas fa-cloud-upload-alt"></i><br>
                                <span>Click to upload or drag and drop</span>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span>INITIATE PROTOCOL <i class="fas fa-chevron-right"
                                style="margin-left:5px; font-size: 0.8em;"></i></span>
                        <div class="loader"></div>
                    </button>
                </form>
            </div>

            <!-- The physical base from which hologram is projected -->
            <div class="projector-base"></div>
        </div>
    </div>

    <!-- QR Modal -->
    <div class="qr-modal-overlay" id="qrModal">
        <div class="qr-modal-box">
            <button class="qr-modal-close" id="qrModalClose" aria-label="Close"><i class="fas fa-times"></i></button>
            <h3>Scan to Pay</h3>
            <img src="payment_qr.jpg" alt="PhonePe Payment QR Code"
                style="width:100%; border-radius:10px; border:2px solid rgba(0,255,200,0.2);" />
            <p
                style="margin-top:1rem; font-size:0.8rem; color:rgba(255,255,255,0.5); font-family:'Inter',sans-serif; letter-spacing:0.05em;">
                Scan using any UPI app &bull; PhonePe / GPay / Paytm</p>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage">Message</span>
    </div>

    <script src="js/main.js"></script>
    <script>
        const qrTrigger = document.getElementById('qrTrigger');
        const qrModal = document.getElementById('qrModal');
        const qrClose = document.getElementById('qrModalClose');

        qrTrigger.addEventListener('click', function () {
            qrModal.classList.add('active');
        });
        qrClose.addEventListener('click', function (e) {
            e.stopPropagation();
            qrModal.classList.remove('active');
        });
        qrModal.addEventListener('click', function (e) {
            if (e.target === qrModal) qrModal.classList.remove('active');
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') qrModal.classList.remove('active');
        });
    </script>
</body>

</html>
