<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | SAMVEEKSHANA</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ── Lock Screen ── */
        #lockScreen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #05050f;
            font-family: 'Space Grotesk', sans-serif;
        }

        #lockScreen .lock-box {
            background: linear-gradient(135deg, #0d0d1a, #12122a);
            border: 1px solid rgba(0, 255, 200, 0.15);
            border-radius: 18px;
            padding: 2.5rem 2rem;
            width: 90%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 0 80px rgba(0, 255, 200, 0.08);
        }

        #lockScreen .lock-icon {
            font-size: 2.5rem;
            color: #00ffc8;
            margin-bottom: 1rem;
            opacity: 0.8;
        }

        #lockScreen h2 {
            font-size: 1rem;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: #ffffff;
            margin-bottom: 0.3rem;
        }

        #lockScreen p {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.1em;
            margin-bottom: 1.75rem;
        }

        #lockScreen input {
            width: 100%;
            padding: 0.85rem 1rem;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 200, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            letter-spacing: 0.08em;
            outline: none;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }

        #lockScreen input:focus {
            border-color: rgba(0, 255, 200, 0.5);
        }

        #lockScreen button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #00ffc8, #0077ff);
            color: #000;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        #lockScreen button:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        #lockScreen .lock-error {
            margin-top: 0.85rem;
            font-size: 0.78rem;
            color: #ff6b6b;
            letter-spacing: 0.08em;
            min-height: 1.1em;
            transition: opacity 0.2s;
        }

        /* hide admin content until unlocked */
        .admin-layout,
        #imageModal {
            visibility: hidden;
            pointer-events: none;
        }

        .admin-layout.unlocked {
            visibility: visible;
            pointer-events: auto;
        }

        #imageModal.unlocked {
            visibility: visible;
            pointer-events: none;
        }

        #imageModal.unlocked.active {
            pointer-events: auto;
        }
    </style>
</head>

<body>

    <!-- ── Lock Screen ── -->
    <div id="lockScreen">
        <div class="lock-box">
            <div class="lock-icon"><i class="fas fa-shield-halved"></i></div>
            <h2>Admin Access</h2>
            <p>SAMVEEKSHANA &rsquo;26 &mdash; Restricted Area</p>
            <input type="password" id="lockPwd" placeholder="Enter password" autocomplete="off" />
            <button id="lockBtn">Unlock <i class="fas fa-arrow-right" style="margin-left:6px;"></i></button>
            <div class="lock-error" id="lockErr"></div>
        </div>
    </div>

    <div class="admin-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>ADMIN</h2>
                <div
                    style="font-size:0.75rem; color:var(--primary); text-transform:uppercase; letter-spacing:2px; margin-top:0.4rem;">
                    Samveekshana '26
                </div>
            </div>

            <ul class="nav-menu" id="adminNavMenu">
                <!-- Loaded dynamically via JS -->
            </ul>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <div class="dashboard-header">
                <div>
                    <h1 id="currentEventTitle">All Registrations</h1>
                    <p id="currentEventSubtitle" style="color: var(--text-muted); font-size: 0.95rem; margin-top: 0.4rem;">
                        Overview of student registrations
                    </p>
                </div>

                <div class="stat-card"
                    style="padding: 1rem 2rem; flex-direction: row; align-items: center; gap: 1.5rem;">
                    <div class="title" style="margin:0;">Total</div>
                    <div class="value" id="totalCount" style="font-size:2rem; color:var(--primary);">0</div>
                </div>
            </div>

            <!-- Data Table -->
            <div class="data-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Student Name</th>
                            <th>Event</th>
                            <th>Email Address</th>
                            <th>Phone</th>
                            <th>UTR Number</th>
                            <th>Registration Date</th>
                            <th>Receipt</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Loaded dynamically via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Image Modal Overlay -->
    <div class="modal-backdrop" id="imageModal">
        <div class="modal-content">
            <button class="modal-close"><i class="fas fa-times"></i></button>
            <img src="" id="modalImage" class="modal-img" alt="Payment Screenshot" hidden>
            <iframe src="about:blank" id="modalFrame" class="modal-frame" title="Payment Receipt" hidden></iframe>
        </div>
    </div>

</body>

</html>
